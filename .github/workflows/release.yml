name: Release

# Triggered by pushing a version tag, which `cargo release` does for us.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Turn the pushed git tag into an actual GitHub Release object. The upload
  # jobs below attach assets to it; they cannot create it themselves, so this
  # must run (and finish) first.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Builds rhymomatic, packages it as `rhymomatic-<target>.{tar.gz,zip}`
      # with LICENSE and README included, and attaches it to the release created
      # above. Cross-compiles Linux targets transparently via `cross`.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rhymomatic
          target: ${{ matrix.target }}
          include: LICENSE,README.md
          archive: $bin-$target
          token: ${{ secrets.GITHUB_TOKEN }}
